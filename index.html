<!DOCTYPE html>
<html lang="fi">
<head>

  />
  <style>
    #lock-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #0e1117;
      display: flex; align-items: center; justify-content: center;
    }
    #lock-box {
      background: #1e2130; border-radius: 12px; padding: 2.5rem 3rem;

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-8px); }
      40%,80%  { transform: translateX(8px); }
    }
    .shake { animation: shake .4s ease; }
  </style>
</head>

async function sha256(str) {
  const buf = await crypto.subtle.digest(
    "SHA-256", new TextEncoder().encode(str)
  );
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, "0")).join("");
}

function mountApp() {
  const lock = document.getElementById("lock-screen");
  if (lock) lock.remove();
  stlite.mount(
    {
      requirements: ["pandas", "openpyxl"],
      entrypoint: "app.py",
      files: {
  
      "app.py": "\"\"\"ERP-tuoterekisterin muuntotyökalu – Streamlit-sovellus.\"\"\"\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nimport pandas as pd\nimport streamlit as st\n\nsys.path.insert(0, str(Path(__file__).parent))\n\nfrom collections import defaultdict\n\nfrom converter.column_mapper import auto_map, erp_fields_in_order, NO_MAPPING\nfrom converter.exporter import build_output, to_csv_bytes, to_zip_bytes\nfrom converter.file_reader import (\n    SUPPORTED_FORMATS,\n    apply_header,\n    detect_header_row,\n    load_file,\n    merge_sheets,\n)\nfrom converter.transformer import ERROR, WARNING, build_transformed_df\nfrom config.field_synonyms import ERP_ALWAYS_OUTPUT, ERP_FIELD_ORDER, ERP_REQUIRED_FIELDS\n\nst.set_page_config(\n    page_title=\"ERP-tuotemuunnin\",\n    page_icon=\"🔄\",\n    layout=\"wide\",\n)\n\nst.title(\"ERP-tuoterekisterin muuntotyökalu\")\nst.caption(\"Muuntaa toimittajan Excel/CSV-hinnaston ERP:n sisäänluettavaan CSV-muotoon.\")\n\n# ── 1. Tiedoston lataus ───────────────────────────────────────────────────────\nst.header(\"1. Lataa tiedosto\")\nuploaded = st.file_uploader(\n    \"Valitse tiedosto\",\n    type=SUPPORTED_FORMATS,\n    help=\"Tuetut formaatit: \" + \", \".join(f\".{f}\" for f in SUPPORTED_FORMATS),\n)\n\nif not uploaded:\n    st.stop()\n\ntry:\n    loaded = load_file(uploaded, uploaded.name)\nexcept Exception as e:\n    st.error(f\"Tiedoston lukeminen epäonnistui: {e}\")\n    st.stop()\n\n# ── 2. Välilehtien valinta ja sarakekartoitus ─────────────────────────────────\nst.header(\"2. Välilehtien valinta ja sarakekartoitus\")\n\n# Sheet selection\nuse_all_sheets = False\nselected_sheets: list[str] = []\n\nif len(loaded.sheet_names) > 1:\n    merge_all = st.checkbox(\n        \"Yhdistä kaikki välilehdet\",\n        value=False,\n        help=\"Lukee kaikki Excel-välilehdet ja yhdistää ne peräkkäin.\",\n    )\n    if merge_all:\n        use_all_sheets = True\n        selected_sheets = loaded.sheet_names\n    else:\n        selected_sheets = [st.selectbox(\"Valitse välilehti\", loaded.sheet_names)]\nelse:\n    selected_sheets = loaded.sheet_names\n    st.caption(f\"Tiedostossa yksi välilehti: **{selected_sheets[0]}**\")\n\n# Header row selection – always detected/previewed from the first sheet\nraw_df = loaded.raw_frames[selected_sheets[0]]\ndetected_row = detect_header_row(raw_df)\nheader_row = int(st.number_input(\n    \"Otsikkorivi\",\n    min_value=0,\n    max_value=max(0, len(raw_df) - 1),\n    value=detected_row,\n    step=1,\n    help=\"Työkalu tunnistaa otsikkorivin automaattisesti (0 = ensimmäinen rivi). Korjaa tarvittaessa.\",\n))\n\ndef _style_raw(row):\n    if row.name == header_row:\n        return [\"background-color: #c6efce; font-weight: bold\"] * len(row)\n    if row.name < header_row:\n        return [\"color: #aaaaaa; font-style: italic\"] * len(row)\n    return [\"\"] * len(row)\n\n# Parse: when merging all sheets, apply header per sheet then concat so that\n# each sheet's header row is stripped rather than becoming a data row.\nif use_all_sheets:\n    data_df = pd.concat(\n        [apply_header(loaded.raw_frames[k], header_row) for k in selected_sheets],\n        ignore_index=True,\n    )\nelse:\n    data_df = apply_header(raw_df, header_row)\n\n# Drop columns where every data row is blank (Excel spacer/formatting columns)\n_blank_positions = {\n    i for i in range(len(data_df.columns))\n    if data_df.iloc[:, i].map(lambda v: pd.isna(v) or str(v).strip() == \"\").all()\n}\nif _blank_positions:\n    _keep = [i for i in range(len(data_df.columns)) if i not in _blank_positions]\n    data_df = data_df.iloc[:, _keep]\n    raw_df = raw_df.iloc[:, _keep]\n\nsource_columns = list(data_df.columns)\n\nerp_options = [\"\"] + erp_fields_in_order()\nmapping: dict[str, str] = {}\n\nwith st.expander(\"Esikatselu ja sarakekartoitus\", expanded=True):\n    use_auto = st.toggle(\n        \"Automaattikartoitus (fuzzy-matching)\",\n        value=True,\n        key=\"use_auto_toggle\",\n        help=\"Työkalu yrittää tunnistaa sarakkeet nimien perusteella. Tarkista tulos alla.\",\n    )\n\n    # Key includes use_auto: toggling resets the editor to fresh initial values\n    initial_mapping = auto_map(source_columns) if use_auto else {s: NO_MAPPING for s in source_columns}\n\n    st.caption(\n        f\"Vihreällä korostettu rivi {header_row} käytetään sarakeotsikoina. \"\n        f\"Harmaat rivit sen yläpuolella ohitetaan. \"\n        f\"{len(data_df)} tuoteriviä · {len(source_columns)} saraketta.\"\n    )\n\n    # Raw data preview\n    show_all_raw = st.checkbox(\"Näytä kaikki rivit\", value=False, key=\"show_all_raw\")\n    preview_end = len(raw_df) if show_all_raw else min(header_row + 15, len(raw_df))\n    raw_preview = raw_df.iloc[:preview_end].copy()\n    raw_preview.index = range(len(raw_preview))\n    st.dataframe(\n        raw_preview.style.apply(_style_raw, axis=1),\n        use_container_width=True,\n        height=700 if show_all_raw else 300,\n    )\n\n    # Vertical mapping table – capped to half the page width\n    mapping_init_df = pd.DataFrame([\n        {\"Lähdesarake\": src, \"ERP-kenttä\": initial_mapping.get(src, \"\")}\n        for src in source_columns\n    ])\n    map_col, info_col = st.columns([1, 1])\n    with map_col:\n        edited_df = st.data_editor(\n            mapping_init_df,\n            column_config={\n                \"Lähdesarake\": st.column_config.TextColumn(disabled=True),\n                \"ERP-kenttä\": st.column_config.SelectboxColumn(\n                    options=erp_options,\n                    default=\"\",\n                    required=False,\n                ),\n            },\n            key=f\"map_editor_{uploaded.name}_{use_auto}\",\n            hide_index=True,\n            use_container_width=True,\n            num_rows=\"fixed\",\n            height=min(36 * len(source_columns) + 38, 320),\n        )\n    for _, row in edited_df.iterrows():\n        src = row[\"Lähdesarake\"]\n        val = row[\"ERP-kenttä\"]\n        mapping[src] = str(val) if pd.notna(val) and str(val) not in (\"\", \"nan\", \"None\") else NO_MAPPING\n\n    # Detect duplicate ERP-field selections (Nimi may appear on multiple rows)\n    _erp_to_srcs: dict[str, list[str]] = defaultdict(list)\n    for _s, _e in mapping.items():\n        if _e and _e != NO_MAPPING:\n            _erp_to_srcs[_e].append(_s)\n\n    nimi_sources: list[str] = _erp_to_srcs.get(\"Nimi\", [])\n    _dup_non_nimi = {\n        erp: srcs for erp, srcs in _erp_to_srcs.items()\n        if len(srcs) > 1 and erp != \"Nimi\"\n    }\n\n    nimi_sources_ordered: list[str] = list(nimi_sources)\n\n    with info_col:\n        if _dup_non_nimi:\n            for _ef, _es in _dup_non_nimi.items():\n                st.warning(\n                    f\"**{_ef}** on kartoitettu useammalle sarakkeelle \"\n                    f\"({', '.join(_es)}). Käytetään: **{_es[0]}**.\"\n                )\n        if len(nimi_sources) > 1:\n            st.caption(\"**Nimi-sarakkeiden yhdistymisjärjestys** (pienin luku ensin):\")\n            _nimi_order_df = pd.DataFrame({\n                \"Lähdesarake\": nimi_sources,\n                \"Järjestys\": list(range(1, len(nimi_sources) + 1)),\n            })\n            _edited_nimi = st.data_editor(\n                _nimi_order_df,\n                column_config={\n                    \"Lähdesarake\": st.column_config.TextColumn(disabled=True),\n                    \"Järjestys\": st.column_config.NumberColumn(min_value=1, step=1),\n                },\n                hide_index=True,\n                use_container_width=True,\n                num_rows=\"fixed\",\n                key=f\"nimi_order_{uploaded.name}_{use_auto}\",\n            )\n            nimi_sources_ordered = list(\n                _edited_nimi.sort_values(\"Järjestys\", kind=\"stable\")[\"Lähdesarake\"]\n            )\n\n    # Required fields status\n    mapped_erp_inner = {v for v in mapping.values() if v}\n    req_badges = [\n        f\":green[✓ {f}]\" if f in mapped_erp_inner else f\":red[✗ {f}]\"\n        for f in ERP_REQUIRED_FIELDS\n    ]\n    alv_badges = [\n        f\":green[✓ {f}]\" if f in mapped_erp_inner else f\":orange[⚠ {f} (oletus)]\"\n        for f in ERP_ALWAYS_OUTPUT\n    ]\n    st.markdown(\"**Pakolliset kentät:** \" + \" · \".join(req_badges + alv_badges))\n\nmapped_erp = {v for v in mapping.values() if v}\nhinta_mapped = \"Myyntihinta\" in mapped_erp\n\n# ── 3. Oletusarvot ja lisäasetukset ──────────────────────────────────────────\nst.header(\"3. Oletusarvot ja lisäasetukset\")\n\ncol_a, col_b, col_c = st.columns(3)\nalv_default = col_a.text_input(\"ALV-oletus (%)\", value=\"25,5\")\npaaryhma_default = col_b.text_input(\"Pääryhmä-oletus\", value=\"Oletus\")\ntuoteryhma_default = col_c.text_input(\"Tuoteryhmä-oletus\", value=\"Oletus\")\n\nuse_section_headers = st.checkbox(\n    \"Käytä väliotsikkoja Tuoteryhmänä\",\n    value=False,\n    help=(\n        \"Jos tiedostossa on kategoriarivejä (ei nimeä eikä hintaa), \"\n        \"käytetään niitä alla olevien tuotteiden Tuoteryhmänä.\"\n    ),\n)\n\nkoodi_mapped = \"Koodi\" in mapped_erp\nif not koodi_mapped:\n    st.subheader(\"Koodinumerointi\")\n    col_s, col_i = st.columns(2)\n    auto_code_start = col_s.number_input(\"Aloitusnumero\", value=1000, step=1)\n    auto_code_interval = col_i.number_input(\"Intervalli\", value=10, step=1)\nelse:\n    auto_code_start = None\n    auto_code_interval = 10\n\nhinta_mode: str | None = None\nhinta_markup = 0.0\nif not hinta_mapped:\n    st.subheader(\"Myyntihinnan lähde\")\n    hinta_mode = st.radio(\n        \"Myyntihintaa ei ole kartoitettu\",\n        options=[\"nolla\", \"ostohinta\"],\n        captions=[\n            \"Myyntihinta = 0 kaikille tuotteille\",\n            \"Lasketaan ostohinnasta\",\n        ],\n        horizontal=True,\n    )\n    if hinta_mode == \"ostohinta\":\n        hinta_markup = st.number_input(\n            \"Kate (%)\",\n            value=0.0,\n            min_value=0.0,\n            step=0.5,\n            help=\"Myyntihinta = Ostohinta × (1 + kate / 100)\",\n        )\n\nerror_handling = st.radio(\n    \"Virheelliset rivit (validointivirheet)\",\n    options=[\"sisällytä\", \"poista\", \"erillinen tiedosto\"],\n    captions=[\n        \"Kaikki rivit mukaan, virheet merkitty punaisella\",\n        \"Virheelliset rivit jätetään pois päätulosteesta\",\n        \"Virheelliset rivit erilliseen _error.csv-tiedostoon\",\n    ],\n    horizontal=True,\n)\n\nset_verollisuus = st.checkbox(\"Hinnat verollisia (Verollisuus = 1)\", value=False)\n\nallow_empty_cols = st.checkbox(\n    \"Salli tyhjät sarakkeet kenttävalinnassa\",\n    value=False,\n    help=\"Näyttää kaikki ERP-kentät kenttävalinnassa, myös kartoittamattomat.\",\n)\n\n# ── 4. Kenttävalinta tulostukseen ─────────────────────────────────────────────\nst.header(\"4. Kenttävalinta tulostukseen\")\n\nalways_fields = ERP_REQUIRED_FIELDS + list(ERP_ALWAYS_OUTPUT)\noptional_fields = [f for f in ERP_FIELD_ORDER if f not in always_fields]\ncurrently_mapped_optional = [f for f in optional_fields if f in mapped_erp]\n\nst.markdown(f\"**Pakolliset kentät** (aina mukana): {', '.join(always_fields)}\")\n\nif allow_empty_cols:\n    options = optional_fields\n    default_fields = currently_mapped_optional\nelse:\n    options = currently_mapped_optional\n    default_fields = currently_mapped_optional\n\nif options:\n    selected_optional = st.multiselect(\n        \"Valitse lisäkentät tulostukseen\",\n        options=options,\n        default=default_fields,\n        help=\"Vain kartoitetut kentät näkyvät valinnoissa. Järjestys noudattaa aina ERP-formaattia.\",\n    )\nelse:\n    st.info(\"Ei valinnaisia kenttiä kartoitettuna. Tulosteessa vain pakolliset kentät.\")\n    selected_optional = []\n\n# ── 5. Esikatselu ja vienti ───────────────────────────────────────────────────\nst.header(\"5. Esikatselu ja vienti\")\n\n# Invalidate cached result when file or key settings change\n_run_key = f\"{uploaded.name}_{uploaded.size}_{error_handling}\"\nif st.session_state.get(\"_result_key\") != _run_key:\n    st.session_state.pop(\"_result\", None)\n    st.session_state[\"_result_key\"] = _run_key\n\nif st.button(\"▶ Muodosta tuloste\", type=\"primary\"):\n    if not paaryhma_default.strip():\n        st.error(\"Pääryhmä-oletus ei voi olla tyhjä. Aseta oletusarvo kohdassa 3.\")\n        st.stop()\n    if not tuoteryhma_default.strip():\n        st.error(\"Tuoteryhmä-oletus ei voi olla tyhjä. Aseta oletusarvo kohdassa 3.\")\n        st.stop()\n\n    # Build a clean mapping: de-dupe non-Nimi fields (keep first), handle Nimi merge\n    _seen: set[str] = set()\n    transform_mapping: dict[str, str] = {}\n    for _s, _e in mapping.items():\n        if not _e or _e == NO_MAPPING or _e == \"Nimi\":\n            continue\n        if _e not in _seen:\n            transform_mapping[_s] = _e\n            _seen.add(_e)\n\n    data_df_for_transform = data_df\n    _valid_nimi = [s for s in nimi_sources_ordered if s in data_df.columns]\n    if len(_valid_nimi) > 1:\n        data_df_for_transform = data_df.copy()\n        _first = _valid_nimi[0]\n        data_df_for_transform[_first] = (\n            data_df_for_transform[_valid_nimi]\n            .fillna(\"\").astype(str)\n            .apply(lambda r: \" \".join(v.strip() for v in r if v.strip()), axis=1)\n        )\n        transform_mapping[_first] = \"Nimi\"\n    elif _valid_nimi:\n        transform_mapping[_valid_nimi[0]] = \"Nimi\"\n\n    if not hinta_mapped:\n        if data_df_for_transform is data_df:\n            data_df_for_transform = data_df.copy()\n        if hinta_mode == \"nolla\":\n            data_df_for_transform[\"__hinta__\"] = \"0\"\n            transform_mapping[\"__hinta__\"] = \"Myyntihinta\"\n        elif hinta_mode == \"ostohinta\":\n            _osto_src = next(\n                (s for s, e in transform_mapping.items() if e == \"Ostohinta\"), None\n            )\n            if not _osto_src:\n                st.error(\n                    \"Ostohintaa ei ole kartoitettu. \"\n                    \"Kartoita Ostohinta tai valitse 'Myyntihinta = 0'.\"\n                )\n                st.stop()\n            _mult = 1.0 + hinta_markup / 100.0\n            def _calc_price(val, mult=_mult):\n                try:\n                    v = float(str(val).replace(\",\", \".\"))\n                    return f\"{v * mult:g}\".replace(\".\", \",\")\n                except (ValueError, TypeError):\n                    return \"\"\n            data_df_for_transform[\"__hinta__\"] = (\n                data_df_for_transform[_osto_src].apply(_calc_price)\n            )\n            transform_mapping[\"__hinta__\"] = \"Myyntihinta\"\n\n    try:\n        result = build_transformed_df(\n            data_df_for_transform,\n            transform_mapping,\n            use_section_headers=use_section_headers,\n            alv_default=alv_default,\n            paaryhma_default=paaryhma_default,\n            tuoteryhma_default=tuoteryhma_default,\n            auto_code_start=int(auto_code_start) if not koodi_mapped else None,\n            auto_code_interval=int(auto_code_interval),\n        )\n    except Exception as e:\n        st.error(f\"Muunnos epäonnistui: {e}\")\n        st.stop()\n\n    df_result = result.df\n    issues = result.issues\n\n    if set_verollisuus:\n        df_result[\"Verollisuus\"] = \"1\"\n\n    row_severity: dict[int, str] = {}\n    for issue in issues:\n        current = row_severity.get(issue.row_idx, \"\")\n        if issue.level == ERROR:\n            row_severity[issue.row_idx] = ERROR\n        elif issue.level == WARNING and current != ERROR:\n            row_severity[issue.row_idx] = WARNING\n\n    selected_fields = ERP_REQUIRED_FIELDS + list(ERP_ALWAYS_OUTPUT) + selected_optional\n    if set_verollisuus and \"Verollisuus\" not in selected_fields:\n        selected_fields = selected_fields + [\"Verollisuus\"]\n    error_row_indices = {i.row_idx for i in issues if i.level == ERROR}\n\n    if error_handling == \"poista\":\n        clean_df = df_result[~df_result.index.isin(error_row_indices)].reset_index(drop=True)\n        error_df = df_result[df_result.index.isin(error_row_indices)].reset_index(drop=True)\n        out_df = build_output(clean_df, selected_fields)\n        out_error_df = build_output(error_df, selected_fields) if not error_df.empty else None\n    elif error_handling == \"erillinen tiedosto\":\n        clean_df = df_result[~df_result.index.isin(error_row_indices)].reset_index(drop=True)\n        error_df = df_result[df_result.index.isin(error_row_indices)].reset_index(drop=True)\n        out_df = build_output(clean_df, selected_fields)\n        out_error_df = build_output(error_df, selected_fields) if not error_df.empty else None\n    else:\n        out_df = build_output(df_result, selected_fields)\n        out_error_df = None\n\n    st.session_state[\"_result\"] = {\n        \"out_df\": out_df,\n        \"out_error_df\": out_error_df,\n        \"row_severity\": row_severity,\n        \"issues\": issues,\n        \"error_row_indices\": error_row_indices,\n        \"base_name\": Path(uploaded.name).stem,\n    }\n\nif \"_result\" in st.session_state:\n    _r = st.session_state[\"_result\"]\n    out_df        = _r[\"out_df\"]\n    out_error_df  = _r[\"out_error_df\"]\n    row_severity  = _r[\"row_severity\"]\n    issues        = _r[\"issues\"]\n    error_row_indices = _r[\"error_row_indices\"]\n    base_name     = _r[\"base_name\"]\n\n    errors   = [i for i in issues if i.level == ERROR]\n    warnings = [i for i in issues if i.level == WARNING]\n\n    if errors:\n        st.error(f\"{len(errors)} virhettä löytyi. Katso alla.\")\n    if warnings:\n        st.warning(f\"{len(warnings)} varoitusta löytyi.\")\n    if error_handling == \"poista\" and errors:\n        st.info(f\"{len(error_row_indices)} virheellistä riviä poistettu päätulosteesta.\")\n\n    if issues:\n        with st.expander(\"Validointitulokset\", expanded=bool(errors)):\n            issue_data = [\n                {\n                    \"Rivi\": i.row_idx + 1,\n                    \"Kenttä\": i.field,\n                    \"Taso\": \"🔴 Virhe\" if i.level == ERROR else \"🟡 Varoitus\",\n                    \"Viesti\": i.message,\n                }\n                for i in issues\n            ]\n            st.dataframe(pd.DataFrame(issue_data), use_container_width=True)\n\n    def highlight_rows(row):\n        sev = row_severity.get(row.name, \"\")\n        if sev == ERROR:\n            return [\"background-color: #ffcccc\"] * len(row)\n        if sev == WARNING:\n            return [\"background-color: #fff3cd\"] * len(row)\n        return [\"\"] * len(row)\n\n    show_all_out = st.checkbox(\"Näytä kaikki rivit\", value=False, key=\"show_all_out\")\n    st.markdown(f\"**Esikatselu** – {len(out_df)} riviä · {len(out_df.columns)} saraketta\")\n    preview = out_df.copy() if show_all_out else out_df.head(15).copy()\n    preview.index = preview.index + 1\n    styled = (\n        preview.style.apply(highlight_rows, axis=1)\n        if error_handling == \"sisällytä\"\n        else preview.style\n    )\n    st.dataframe(styled, use_container_width=True, height=700 if show_all_out else 400)\n\n    if out_error_df is not None and not out_error_df.empty:\n        st.download_button(\n            label=f\"⬇ Lataa tulosteet ZIP ({len(out_error_df)} virheriviä erillisessä tiedostossa)\",\n            data=to_zip_bytes({\n                f\"{base_name}_erp.csv\": to_csv_bytes(out_df),\n                f\"{base_name}_error.csv\": to_csv_bytes(out_error_df),\n            }),\n            file_name=f\"{base_name}_erp.zip\",\n            mime=\"application/zip\",\n            type=\"primary\",\n        )\n    else:\n        st.download_button(\n            label=\"⬇ Lataa tuloste-CSV\",\n            data=to_csv_bytes(out_df),\n            file_name=f\"{base_name}_erp.csv\",\n            mime=\"text/csv\",\n            type=\"primary\",\n        )\n",
      "converter/__init__.py": "",
      "converter/file_reader.py": "\"\"\"Reads xlsx/xls/csv/ods files and detects the header row.\"\"\"\nfrom __future__ import annotations\n\nimport io\nfrom pathlib import Path\nfrom typing import NamedTuple\n\nimport pandas as pd\n\ntry:\n    import xlrd as _xlrd  # noqa: F401\n    _HAS_XLS = True\nexcept ImportError:\n    _HAS_XLS = False\n\ntry:\n    import odf as _odf  # noqa: F401\n    _HAS_ODS = True\nexcept ImportError:\n    _HAS_ODS = False\n\nSUPPORTED_FORMATS = (\n    [\"xlsx\", \"csv\"]\n    + ([\"xls\"] if _HAS_XLS else [])\n    + ([\"ods\"] if _HAS_ODS else [])\n)\n\n\nclass LoadedFile(NamedTuple):\n    sheet_names: list[str]\n    raw_frames: dict[str, pd.DataFrame]  # sheet → full raw dataframe (no header parsing)\n\n\ndef load_file(file_obj: io.BytesIO, filename: str) -> LoadedFile:\n    \"\"\"Load all sheets from an uploaded file into raw DataFrames (no header applied).\"\"\"\n    suffix = Path(filename).suffix.lower()\n\n    if suffix in (\".xlsx\", \".xlsm\"):\n        xf = pd.ExcelFile(file_obj, engine=\"openpyxl\")\n    elif suffix == \".xls\":\n        if not _HAS_XLS:\n            raise ValueError(\"XLS-tiedostot eivät ole tuettuja tässä versiossa. Muunna tiedosto XLSX-muotoon.\")\n        xf = pd.ExcelFile(file_obj, engine=\"xlrd\")\n    elif suffix == \".ods\":\n        if not _HAS_ODS:\n            raise ValueError(\"ODS-tiedostot eivät ole tuettuja tässä versiossa. Muunna tiedosto XLSX-muotoon.\")\n        xf = pd.ExcelFile(file_obj, engine=\"odf\")\n    elif suffix == \".csv\":\n        raw = _read_csv_raw(file_obj)\n        return LoadedFile(sheet_names=[\"Sheet1\"], raw_frames={\"Sheet1\": raw})\n    else:\n        raise ValueError(f\"Tiedostomuoto ei tuettu: {suffix}\")\n\n    raw_frames: dict[str, pd.DataFrame] = {}\n    for name in xf.sheet_names:\n        raw_frames[name] = xf.parse(name, header=None, dtype=str)\n\n    return LoadedFile(sheet_names=xf.sheet_names, raw_frames=raw_frames)\n\n\ndef _read_csv_raw(file_obj: io.BytesIO) -> pd.DataFrame:\n    \"\"\"Try common CSV separators and encodings, return raw DataFrame.\"\"\"\n    data = file_obj.read()\n    for enc in (\"utf-8-sig\", \"utf-8\", \"latin-1\", \"cp1252\"):\n        for sep in (\";\", \",\", \"\\t\", \"|\"):\n            try:\n                df = pd.read_csv(\n                    io.BytesIO(data),\n                    sep=sep,\n                    header=None,\n                    dtype=str,\n                    encoding=enc,\n                    on_bad_lines=\"skip\",\n                )\n                if df.shape[1] > 1:\n                    return df\n            except Exception:\n                continue\n    # fallback\n    return pd.read_csv(io.BytesIO(data), header=None, dtype=str, on_bad_lines=\"skip\")\n\n\ndef merge_sheets(frames: dict[str, pd.DataFrame]) -> pd.DataFrame:\n    \"\"\"Vertically concatenate multiple raw sheets (before header detection).\"\"\"\n    return pd.concat(frames.values(), ignore_index=True)\n\n\ndef detect_header_row(raw: pd.DataFrame, scan_rows: int = 12) -> int:\n    \"\"\"\n    Return the 0-based row index most likely to be the header.\n    Heuristic: the row in the first `scan_rows` rows with the most\n    non-null, non-numeric string cells.\n    \"\"\"\n    best_row = 0\n    best_score = -1\n    limit = min(scan_rows, len(raw))\n    for i in range(limit):\n        row = raw.iloc[i]\n        score = sum(\n            1\n            for v in row\n            if isinstance(v, str) and v.strip() and not _is_numeric(v.strip())\n        )\n        if score > best_score:\n            best_score = score\n            best_row = i\n    return best_row\n\n\ndef apply_header(raw: pd.DataFrame, header_row: int) -> pd.DataFrame:\n    \"\"\"Return a DataFrame with the given row promoted to column names.\"\"\"\n    headers = [str(v).strip() if pd.notna(v) and str(v).strip() else f\"Sarake_{i}\"\n               for i, v in enumerate(raw.iloc[header_row])]\n    # deduplicate\n    seen: dict[str, int] = {}\n    unique: list[str] = []\n    for h in headers:\n        if h in seen:\n            seen[h] += 1\n            unique.append(f\"{h}_{seen[h]}\")\n        else:\n            seen[h] = 0\n            unique.append(h)\n    df = raw.iloc[header_row + 1:].copy()\n    df.columns = unique\n    df = df.reset_index(drop=True)\n    return df\n\n\ndef _is_numeric(s: str) -> bool:\n    try:\n        float(s.replace(\",\", \".\"))\n        return True\n    except ValueError:\n        return False\n",
      "converter/column_mapper.py": "\"\"\"\nRule-based fuzzy column mapping: source column names → ERP field names.\nUses difflib for approximate string matching against the synonym table.\n\"\"\"\nfrom __future__ import annotations\n\nimport difflib\n\nfrom config.field_synonyms import SYNONYMS, ERP_FIELD_ORDER\n\n# Sentinel for \"not mapped\"\nNO_MAPPING = \"\"\n\n\ndef auto_map(source_columns: list[str]) -> dict[str, str]:\n    \"\"\"\n    Return {source_col: erp_field} for every source column that has a\n    confident match.  Columns without a match get NO_MAPPING.\n    Already-taken ERP fields won't be assigned a second time (first-wins).\n    \"\"\"\n    taken: set[str] = set()\n    result: dict[str, str] = {}\n\n    for src in source_columns:\n        src_norm = src.strip().lower()\n        best_field = NO_MAPPING\n        best_score = 0.0\n\n        for erp_field, synonyms in SYNONYMS.items():\n            if erp_field in taken:\n                continue\n            # Exact match first\n            if src_norm in synonyms:\n                best_field = erp_field\n                best_score = 1.0\n                break\n            # Fuzzy match\n            matches = difflib.get_close_matches(src_norm, synonyms, n=1, cutoff=0.75)\n            if matches:\n                score = difflib.SequenceMatcher(None, src_norm, matches[0]).ratio()\n                if score > best_score:\n                    best_score = score\n                    best_field = erp_field\n\n        if best_field:\n            taken.add(best_field)\n        result[src] = best_field\n\n    return result\n\n\ndef erp_fields_in_order() -> list[str]:\n    return list(ERP_FIELD_ORDER)\n\n\ndef available_erp_fields(already_mapped: set[str]) -> list[str]:\n    \"\"\"Return ERP fields not yet assigned, in canonical order.\"\"\"\n    return [f for f in ERP_FIELD_ORDER if f not in already_mapped]\n",
      "converter/transformer.py": "\"\"\"\nData transformation pipeline:\n  - Apply column mapping → rename source columns to ERP field names\n  - Detect and optionally extract section-header rows as Tuoteryhmä\n  - Normalize decimal separators\n  - Apply default values (Alv, Pääryhmä, Tuoteryhmä)\n  - Auto-number Koodi when missing\n  - Validate rows and attach severity flags\n\"\"\"\nfrom __future__ import annotations\n\nimport re\nfrom dataclasses import dataclass, field\nfrom typing import Optional\n\nimport pandas as pd\n\nfrom config.field_synonyms import ERP_REQUIRED_FIELDS  # noqa: F401 (re-exported)\n\n# Known valid Finnish VAT rates\nKNOWN_ALV = {0.0, 10.0, 14.0, 24.0, 25.5}\n\n# Validation issue levels\nERROR = \"error\"\nWARNING = \"warning\"\n\n\n@dataclass\nclass ValidationIssue:\n    row_idx: int\n    field: str\n    level: str  # \"error\" | \"warning\"\n    message: str\n\n\n@dataclass\nclass TransformResult:\n    df: pd.DataFrame\n    issues: list[ValidationIssue] = field(default_factory=list)\n\n\ndef detect_section_rows(\n    df: pd.DataFrame, code_col: str, price_col: str, name_col: str = \"\"\n) -> list[int]:\n    \"\"\"\n    Return row indices that look like section headers or empty rows.\n    A row is a section header when it has no valid price AND no valid name.\n    (Category rows often have text in the code column but nothing in name/price.)\n    \"\"\"\n    header_rows = []\n    for i, row in df.iterrows():\n        price_val = str(row.get(price_col, \"\")).strip() if price_col else \"\"\n        name_val = str(row.get(name_col, \"\")).strip() if name_col else \"\"\n        price_missing = not price_val or price_val.lower() in (\"nan\", \"none\", \"\")\n        price_non_numeric = price_val and not _can_parse_number(price_val)\n        name_missing = not name_val or name_val.lower() in (\"nan\", \"none\", \"\")\n        non_empty = sum(\n            1 for v in row.values\n            if str(v).strip() and str(v).strip().lower() not in (\"nan\", \"none\")\n        )\n        if (price_missing or price_non_numeric) and (name_missing or non_empty <= 1):\n            header_rows.append(i)\n    return header_rows\n\n\ndef apply_mapping(df: pd.DataFrame, mapping: dict[str, str]) -> pd.DataFrame:\n    \"\"\"Rename source columns according to the mapping; drop unmapped columns.\"\"\"\n    rename = {src: dst for src, dst in mapping.items() if dst}\n    df = df.rename(columns=rename)\n    keep = [c for c in df.columns if c in rename.values()]\n    return df[keep].copy()\n\n\ndef apply_section_headers_as_category(\n    raw_df: pd.DataFrame,\n    mapping: dict[str, str],\n    header_row_indices: list[int],\n) -> tuple[pd.DataFrame, dict[int, str]]:\n    \"\"\"\n    Walk the raw_df rows.  When a header row is encountered, capture its\n    first non-empty text value as the current category name.\n    Return a cleaned df (header rows removed) and a dict {original_idx: category}.\n    \"\"\"\n    code_col = _mapped_src(mapping, \"Koodi\")\n    category: str = \"\"\n    idx_to_category: dict[int, str] = {}\n    keep_rows = []\n\n    for i, row in raw_df.iterrows():\n        if i in set(header_row_indices):\n            # Grab first non-empty string cell as category name\n            for v in row.values:\n                s = str(v).strip()\n                if s and s.lower() not in (\"nan\", \"none\"):\n                    category = s\n                    break\n        else:\n            idx_to_category[i] = category\n            keep_rows.append(i)\n\n    cleaned = raw_df.loc[keep_rows].copy()\n    return cleaned, idx_to_category\n\n\ndef build_transformed_df(\n    raw_df: pd.DataFrame,\n    mapping: dict[str, str],\n    *,\n    use_section_headers: bool,\n    alv_default: str,\n    paaryhma_default: str,\n    tuoteryhma_default: str,\n    auto_code_start: Optional[int],\n    auto_code_interval: int,\n) -> TransformResult:\n    \"\"\"Full transformation pipeline.\"\"\"\n\n    code_col = _mapped_src(mapping, \"Koodi\")\n    price_col = _mapped_src(mapping, \"Myyntihinta\")\n    name_col = _mapped_src(mapping, \"Nimi\")\n\n    # 1. Detect section header rows\n    section_row_indices: list[int] = []\n    idx_to_category: dict[int, str] = {}\n\n    if use_section_headers and (code_col or price_col):\n        section_row_indices = detect_section_rows(\n            raw_df, code_col or \"\", price_col or \"\", name_col or \"\"\n        )\n        raw_df, idx_to_category = apply_section_headers_as_category(\n            raw_df, mapping, section_row_indices\n        )\n\n    # 2. Apply column mapping (rename + drop unmapped)\n    df = apply_mapping(raw_df, mapping)\n\n    # 3. Inject category from section headers into Tuoteryhmä\n    if use_section_headers and idx_to_category:\n        cats = pd.Series(idx_to_category, name=\"__cat__\")\n        df[\"__cat__\"] = df.index.map(cats)\n        if \"Tuoteryhmä\" not in df.columns:\n            df[\"Tuoteryhmä\"] = df[\"__cat__\"].fillna(\"\")\n        else:\n            # Only fill where Tuoteryhmä is empty\n            mask = df[\"Tuoteryhmä\"].isna() | (df[\"Tuoteryhmä\"].astype(str).str.strip() == \"\")\n            df.loc[mask, \"Tuoteryhmä\"] = df.loc[mask, \"__cat__\"].fillna(\"\")\n        df = df.drop(columns=[\"__cat__\"])\n\n    df = df.reset_index(drop=True)\n\n    # 3b. Drop rows where all mapped fields are blank\n    non_empty_mask = df.apply(\n        lambda row: any(\n            str(v).strip() not in (\"\", \"nan\", \"None\")\n            for v in row.values\n        ),\n        axis=1,\n    )\n    df = df[non_empty_mask].reset_index(drop=True)\n\n    # 4. Apply defaults for missing fields\n    _ensure_col(df, \"Alv\", alv_default)\n    _ensure_col(df, \"Pääryhmä\", paaryhma_default)\n    _ensure_col(df, \"Tuoteryhmä\", tuoteryhma_default)\n\n    # 5. Normalize decimal separators in numeric-ish columns\n    numeric_cols = [\"Myyntihinta\", \"Ostohinta\", \"Alv\", \"Kilohinta\", \"Paino\",\n                    \"Hälytysraja\", \"Alkusaldo\", \"Pakkauskoko\"]\n    for col in numeric_cols:\n        if col in df.columns:\n            df[col] = df[col].apply(_normalize_decimal)\n\n    # 6. Auto-number Koodi if absent or all empty\n    if \"Koodi\" not in df.columns or df[\"Koodi\"].fillna(\"\").astype(str).str.strip().eq(\"\").all():\n        if auto_code_start is not None:\n            codes = [\n                str(auto_code_start + i * auto_code_interval)\n                for i in range(len(df))\n            ]\n            df[\"Koodi\"] = codes\n        else:\n            df[\"Koodi\"] = \"\"\n\n    # 7. Validate\n    issues = _validate(df)\n\n    return TransformResult(df=df, issues=issues)\n\n\n# ── helpers ──────────────────────────────────────────────────────────────────\n\ndef _mapped_src(mapping: dict[str, str], erp_field: str) -> Optional[str]:\n    for src, dst in mapping.items():\n        if dst == erp_field:\n            return src\n    return None\n\n\ndef _ensure_col(df: pd.DataFrame, col: str, default: str) -> None:\n    if col not in df.columns:\n        df[col] = default\n    else:\n        mask = df[col].isna() | (df[col].astype(str).str.strip() == \"\")\n        df.loc[mask, col] = default\n\n\ndef _normalize_decimal(val) -> str:\n    \"\"\"Return val as string with comma decimal separator, or empty string.\"\"\"\n    if pd.isna(val) or str(val).strip() in (\"\", \"nan\", \"None\"):\n        return \"\"\n    s = str(val).strip()\n    # Remove thousands separators (space or apostrophe)\n    s = re.sub(r\"[\\s'´](?=\\d{3}(\\D|$))\", \"\", s)\n    # Replace comma decimal with dot for parsing\n    s_dot = s.replace(\",\", \".\")\n    try:\n        f = float(s_dot)\n        # Format: no trailing zeros beyond 2 decimal places, use comma\n        formatted = f\"{f:g}\"\n        if \".\" in formatted:\n            formatted = formatted.replace(\".\", \",\")\n        return formatted\n    except ValueError:\n        return s\n\n\ndef _can_parse_number(s: str) -> bool:\n    try:\n        float(s.replace(\",\", \".\"))\n        return True\n    except ValueError:\n        return False\n\n\ndef _validate(df: pd.DataFrame) -> list[ValidationIssue]:\n    issues: list[ValidationIssue] = []\n    seen_codes: dict[str, int] = {}\n\n    for i, row in df.iterrows():\n        # Koodi\n        code = str(row.get(\"Koodi\", \"\")).strip()\n        if not code or code.lower() in (\"nan\", \"none\"):\n            issues.append(ValidationIssue(i, \"Koodi\", ERROR, \"Koodi on tyhjä\"))\n        else:\n            if not re.fullmatch(r\"[\\w\\-. /]+\", code, re.UNICODE):\n                issues.append(\n                    ValidationIssue(i, \"Koodi\", ERROR,\n                                    f\"Koodi sisältää erikoismerkkejä: {code!r}\")\n                )\n            if code in seen_codes:\n                issues.append(\n                    ValidationIssue(i, \"Koodi\", WARNING,\n                                    f\"Koodi '{code}' esiintyy jo rivillä {seen_codes[code] + 1}\")\n                )\n            else:\n                seen_codes[code] = i\n\n        # Nimi\n        nimi = str(row.get(\"Nimi\", \"\")).strip()\n        if not nimi or nimi.lower() in (\"nan\", \"none\"):\n            issues.append(ValidationIssue(i, \"Nimi\", ERROR, \"Nimi on tyhjä\"))\n\n        # Myyntihinta\n        hinta = str(row.get(\"Myyntihinta\", \"\")).strip()\n        if hinta and hinta.lower() not in (\"nan\", \"none\"):\n            if not _can_parse_number(hinta):\n                issues.append(\n                    ValidationIssue(i, \"Myyntihinta\", ERROR,\n                                    f\"Myyntihinta ei ole numero: {hinta!r}\")\n                )\n            elif float(hinta.replace(\",\", \".\")) == 0.0:\n                issues.append(\n                    ValidationIssue(i, \"Myyntihinta\", WARNING, \"Myyntihinta on 0\")\n                )\n        else:\n            issues.append(ValidationIssue(i, \"Myyntihinta\", ERROR, \"Myyntihinta puuttuu\"))\n\n        # Alv\n        alv = str(row.get(\"Alv\", \"\")).strip()\n        if alv and alv.lower() not in (\"nan\", \"none\") and _can_parse_number(alv):\n            alv_f = float(alv.replace(\",\", \".\"))\n            if alv_f not in KNOWN_ALV:\n                issues.append(\n                    ValidationIssue(i, \"Alv\", WARNING,\n                                    f\"Epätavallinen ALV-arvo: {alv}\")\n                )\n\n        # Pääryhmä / Tuoteryhmä\n        for col in (\"Pääryhmä\", \"Tuoteryhmä\"):\n            val = str(row.get(col, \"\")).strip()\n            if not val or val.lower() in (\"nan\", \"none\"):\n                issues.append(ValidationIssue(i, col, ERROR, f\"{col} on tyhjä\"))\n\n    return issues\n",
      "converter/exporter.py": "\"\"\"Builds the semicolon-delimited ERP output CSV.\"\"\"\nfrom __future__ import annotations\n\nimport io\nimport zipfile\n\nimport pandas as pd\n\nfrom config.field_synonyms import ERP_FIELD_ORDER, ERP_REQUIRED_FIELDS\n\n\ndef build_output(\n    df: pd.DataFrame,\n    selected_fields: list[str],\n) -> pd.DataFrame:\n    \"\"\"\n    Return a DataFrame with columns in ERP canonical order.\n    Only includes required fields + selected optional fields.\n    Columns missing from df are added as empty strings.\n    \"\"\"\n    # Always include required fields; merge with user selection preserving order\n    all_fields = ERP_REQUIRED_FIELDS + [\n        f for f in selected_fields if f not in ERP_REQUIRED_FIELDS\n    ]\n    # Re-apply canonical order\n    ordered = [f for f in ERP_FIELD_ORDER if f in all_fields]\n\n    out = pd.DataFrame()\n    for col in ordered:\n        if col in df.columns:\n            out[col] = df[col].fillna(\"\").astype(str).str.strip()\n        else:\n            out[col] = \"\"\n\n    return out\n\n\ndef to_csv_bytes(df: pd.DataFrame) -> bytes:\n    \"\"\"Return UTF-8 CSV bytes with semicolon separator.\"\"\"\n    buf = io.StringIO()\n    df.to_csv(buf, sep=\";\", index=False, lineterminator=\"\\r\\n\")\n    return buf.getvalue().encode(\"utf-8\")\n\n\ndef to_zip_bytes(files: dict[str, bytes]) -> bytes:\n    \"\"\"Return an in-memory ZIP archive containing the given named files.\"\"\"\n    buf = io.BytesIO()\n    with zipfile.ZipFile(buf, \"w\", zipfile.ZIP_DEFLATED) as zf:\n        for name, data in files.items():\n            zf.writestr(name, data)\n    return buf.getvalue()\n",
      "config/field_synonyms.py": "\"\"\"\nMapping from ERP output field name → list of known synonyms in source files.\nLower-case matching is applied; add more synonyms as new suppliers are onboarded.\n\"\"\"\n\n# ERP output field order (matches output_sample.csv exactly)\nERP_FIELD_ORDER = [\n    \"Koodi\",\n    \"Nimi\",\n    \"Laskunimi\",\n    \"Lisätiedot\",\n    \"Sisäiset muistiinpanot\",\n    \"Tuotekuvaus\",\n    \"Myyntihinta\",\n    \"Ostohinta\",\n    \"Kilohinta\",\n    \"EAN-koodi\",\n    \"Yksikkö\",\n    \"Alv\",\n    \"Pääryhmä\",\n    \"Tuoteryhmä\",\n    \"Oletusvarasto\",\n    \"Hyllyosoite\",\n    \"Hälytysraja\",\n    \"Verollisuus\",\n    \"Varastotuote\",\n    \"Toimittaja\",\n    \"Toimittajan tuotenimi\",\n    \"Toimittajan tuotekoodi\",\n    \"Myyntiprovisio-%\",\n    \"Urakkapalkka\",\n    \"Materiaalikulut\",\n    \"Työn osuus\",\n    \"Asennusaika\",\n    \"Myytävä\",\n    \"Tilattava\",\n    \"Portaalituote\",\n    \"Myyntitili\",\n    \"Alkusaldo\",\n    \"Alkuperämaa\",\n    \"CN-koodi\",\n    \"Paino\",\n    \"LVI-numero\",\n    \"Maksimi ale-%\",\n    \"Mobiilituote\",\n    \"Pakkauskoko\",\n    \"Aktiivinen\",\n    \"Keskimääräinen tuntipalkka\",\n    \"Nimi (fi)\",\n    \"Nimi (se)\",\n    \"Nimi (en)\",\n    \"Nimi (no)\",\n    \"Nimi (de)\",\n    \"Nimi (pl)\",\n    \"Tuotekuvaus (Suomi)\",\n    \"Tuotekuvaus (Ruotsi)\",\n    \"Tuotekuvaus (Englanti)\",\n    \"Tuotekuvaus (Norja)\",\n    \"Tuotekuvaus (Saksa)\",\n    \"Tuotekuvaus (Puola)\",\n]\n\n# Minimum required fields (always included in output)\nERP_REQUIRED_FIELDS = [\"Koodi\", \"Nimi\", \"Myyntihinta\", \"Pääryhmä\", \"Tuoteryhmä\"]\nERP_ALWAYS_OUTPUT = [\"Alv\"]  # always in output, filled by default when not mapped\n\nSYNONYMS: dict[str, list[str]] = {\n    \"Koodi\": [\n        \"koodi\", \"tuotekoodi\", \"kdi\", \"mx-koodi\", \"mx koodi\", \"artikkeli\",\n        \"artikkelinumero\", \"tuotenumero\", \"product code\", \"item code\",\n        \"item no\", \"article no\", \"sgan\", \"tuotenumero sgan\",\n    ],\n    \"Nimi\": [\n        \"nimi\", \"tuotenimike\", \"nimike\", \"nimi suomeksi\", \"tuotenimi\",\n        \"tuote\", \"product name\", \"item name\", \"description\", \"kuvaus\",\n        \"nimi (fi)\", \"nimi fi\",\n    ],\n    \"Laskunimi\": [\n        \"laskunimi\", \"invoice name\", \"laskun nimi\",\n    ],\n    \"Lisätiedot\": [\n        \"lisätiedot\", \"lisätieto\", \"additional info\", \"lisänimi\", \"lisätieto\",\n        \"pölytön\", \"extra info\",\n    ],\n    \"Tuotekuvaus\": [\n        \"tuotekuvaus\", \"kuvaus\", \"selite\", \"description\", \"tuotteen lisätieto\",\n        \"product description\",\n    ],\n    \"Myyntihinta\": [\n        \"myyntihinta\", \"oletusmyyntihinta\", \"nettohinta\", \"hinta\",\n        \"myyntihinta\", \"€ alv0%\", \"eur alv0%\", \"alv 0%\", \"alv0%\",\n        \"nettohinta 2025\", \"nettohinta 2024\", \"sales price\", \"net price\",\n        \"hinta alv 0\", \"hinta sis. alv\",\n    ],\n    \"Ostohinta\": [\n        \"ostohinta\", \"hankintahinta\", \"purchase price\", \"buy price\",\n        \"ovh\", \"ostohinta\",\n    ],\n    \"EAN-koodi\": [\n        \"ean\", \"ean-koodi\", \"ean koodi\", \"ean code\", \"barcode\",\n        \"ensisijainen ean-koodi\", \"toissijainen ean-koodi\",\n    ],\n    \"Yksikkö\": [\n        \"yksikkö\", \"yks.\", \"yks\", \"yksikkö suomeksi\", \"unit\", \"uom\",\n        \"hintayksikkö\", \"myyntierä\", \"yks\",\n    ],\n    \"Alv\": [\n        \"alv\", \"alv-%\", \"alv %\", \"vat\", \"vat-%\", \"tax\", \"verokanta\",\n        \"alv-kanta\",\n    ],\n    \"Pääryhmä\": [\n        \"pääryhmä\", \"main group\", \"main category\", \"ryhmittelyperusteet\",\n    ],\n    \"Tuoteryhmä\": [\n        \"tuoteryhmä\", \"tuoteryhmät\", \"product group\", \"category\",\n        \"kategoria\", \"ryhmä\", \"group\",\n    ],\n    \"Oletusvarasto\": [\n        \"oletusvarasto\", \"default warehouse\", \"varasto\",\n    ],\n    \"Hyllyosoite\": [\n        \"hyllyos       },

}

async function tryUnlock() {
  const val  = document.getElementById("pw-input").value;
  const hash = await sha256(val);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem(SESSION_KEY, "1");
    mountApp();
  } else {
    const box = document.getElementById("lock-box");
    document.getElementById("pw-error").textContent = "Väärä salasana.";
    box.classList.remove("shake");
    void box.offsetWidth;
    box.classList.add("shake");
    document.getElementById("pw-input").select();
  }
}

if (!PASSWORD_HASH || sessionStorage.getItem(SESSION_KEY) === "1") {
  mountApp();
} else {
  document.getElementById("pw-btn").addEventListener("click", tryUnlock);
  document.getElementById("pw-input").addEventListener("keydown", e => {
    if (e.key === "Enter") tryUnlock();
  });
}
</script>
